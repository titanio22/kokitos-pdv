<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Kokito's Pizzaria</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="admin-body">
  <div id="sidebar"></div>
  <div class="admin-content">
    <div class="admin-header">
      <h1>📊 Dashboard Financeiro</h1>
    </div>

    <div class="dashboard-grid">
      <div class="card card-periodo">
        <h3>🟢 Hoje</h3>
        <div class="periodo-stats">
          <div class="stat-item"><span class="stat-label">Pedidos</span><span class="stat-num" id="hoje-pedidos">-</span></div>
          <div class="stat-item"><span class="stat-label">Faturamento</span><span class="stat-num" id="hoje-faturamento">-</span></div>
          <div class="stat-item"><span class="stat-label">Ticket Médio</span><span class="stat-num" id="hoje-ticket">-</span></div>
        </div>
      </div>
      <div class="card card-periodo">
        <h3>🔵 Últimos 7 Dias</h3>
        <div class="periodo-stats">
          <div class="stat-item"><span class="stat-label">Pedidos</span><span class="stat-num" id="7d-pedidos">-</span></div>
          <div class="stat-item"><span class="stat-label">Faturamento</span><span class="stat-num" id="7d-faturamento">-</span></div>
          <div class="stat-item"><span class="stat-label">Ticket Médio</span><span class="stat-num" id="7d-ticket">-</span></div>
        </div>
      </div>
      <div class="card card-periodo">
        <h3>🟣 Últimos 30 Dias</h3>
        <div class="periodo-stats">
          <div class="stat-item"><span class="stat-label">Pedidos</span><span class="stat-num" id="30d-pedidos">-</span></div>
          <div class="stat-item"><span class="stat-label">Faturamento</span><span class="stat-num" id="30d-faturamento">-</span></div>
          <div class="stat-item"><span class="stat-label">Ticket Médio</span><span class="stat-num" id="30d-ticket">-</span></div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:20px">
      <h3>⏳ Pendentes: <span id="stat-pendentes">-</span> &nbsp;|&nbsp; 🍽️ Produtos Ativos: <span id="stat-produtos">-</span></h3>
    </div>

    <div class="card" style="margin-top:20px">
      <h3>📋 Pedidos Recentes</h3>
      <div id="pedidos-recentes"></div>
    </div>
  </div>

  <style>
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
    .card-periodo { text-align: center; padding: 20px; }
    .card-periodo h3 { margin-bottom: 16px; font-size: 1.1rem; }
    .periodo-stats { display: flex; flex-direction: column; gap: 12px; }
    .stat-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #f8f9fa; border-radius: 6px; }
    .stat-label { font-size: 0.85rem; color: #666; }
    .stat-num { font-size: 1.2rem; font-weight: 700; }
  </style>

  <script src="admin.js"></script>
  <script>
    function fmt(val) { return 'R$ ' + Number(val).toFixed(2).replace('.',','); }

    function carregarDashboard() {
      fetch('/api/dashboard')
        .then(r => r.json())
        .then(data => {
          document.getElementById('hoje-pedidos').textContent = data.hoje.pedidos;
          document.getElementById('hoje-faturamento').textContent = fmt(data.hoje.faturamento);
          document.getElementById('hoje-ticket').textContent = fmt(data.hoje.ticketMedio);

          document.getElementById('7d-pedidos').textContent = data.seteDias.pedidos;
          document.getElementById('7d-faturamento').textContent = fmt(data.seteDias.faturamento);
          document.getElementById('7d-ticket').textContent = fmt(data.seteDias.ticketMedio);

          document.getElementById('30d-pedidos').textContent = data.trintaDias.pedidos;
          document.getElementById('30d-faturamento').textContent = fmt(data.trintaDias.faturamento);
          document.getElementById('30d-ticket').textContent = fmt(data.trintaDias.ticketMedio);

          document.getElementById('stat-pendentes').textContent = data.pedidosPendentes;
          document.getElementById('stat-produtos').textContent = data.produtosAtivos;

          const container = document.getElementById('pedidos-recentes');
          if (data.pedidosRecentes.length === 0) {
            container.innerHTML = '<div class="empty-state"><p>Nenhum pedido recente</p></div>';
            return;
          }
          let html = '<table class="tabela"><thead><tr><th>#</th><th>Cliente</th><th>Total</th><th>Status</th><th>Data</th></tr></thead><tbody>';
          const statusLabels = { novo: 'Novo', preparando: 'Preparando', saiu_entrega: 'Saiu p/ Entrega', entregue: 'Entregue', cancelado: 'Cancelado' };
          data.pedidosRecentes.forEach(p => {
            html += '<tr onclick="location.href=\'pedidos.html\'">' +
              '<td>#' + p.id + '</td>' +
              '<td>' + p.cliente_nome + '</td>' +
              '<td>' + fmt(p.total) + '</td>' +
              '<td><span class="badge badge-' + p.status + '">' + (statusLabels[p.status] || p.status) + '</span></td>' +
              '<td>' + p.criado_em + '</td></tr>';
          });
          html += '</tbody></table>';
          container.innerHTML = html;
        });
    }
    carregarDashboard();
    setInterval(carregarDashboard, 5000);
  </script>
</body>
</html>
