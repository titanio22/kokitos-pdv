<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Kokito's Pizzaria</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .login-error { color: #dc2626; font-size: 0.85rem; margin-top: 10px; display: none; }
  </style>
</head>
<body class="admin-login">
  <div class="admin-login-box">
    <span class="logo-login">🍕</span>
    <h1>Kokito's Pizzaria</h1>
    <p class="login-subtitle">Área administrativa</p>
    <form onsubmit="fazerLogin(event)">
      <div class="form-group">
        <label>Usuário</label>
        <input type="text" id="login-usuario" value="titanio" placeholder="Digite seu usuário" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="Digite sua senha" required>
      </div>
      <p class="login-error" id="login-error">Usuário ou senha incorretos!</p>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;justify-content:center;font-size:1rem;">Entrar</button>
    </form>
  </div>
  <script>
    function fazerLogin(e) {
      e.preventDefault();
      const usuario = document.getElementById('login-usuario').value.trim().toLowerCase();
      const senha = document.getElementById('login-senha').value;
      if (usuario === 'titanio' && senha === '31599198') {
        sessionStorage.setItem('admin_logado', 'true');
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }
    if (sessionStorage.getItem('admin_logado') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
