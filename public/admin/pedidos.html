<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos - Kokito's Pizzaria</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="admin-body">
  <div id="sidebar"></div>
  <div class="admin-content">
    <div class="admin-header">
      <h1>📋 Pedidos</h1>
      <div>
        <select id="filtro-status" onchange="carregarPedidos()">
          <option value="">Todos os status</option>
          <option value="novo">Novo</option>
          <option value="preparando">Preparando</option>
          <option value="saiu_entrega">Saiu p/ Entrega</option>
          <option value="entregue">Entregue</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>
    </div>
    <div class="card" id="pedidos-container"></div>
  </div>

  <div id="modal-pedido" class="modal" style="display:none">
    <div class="modal-content">
      <span class="fechar" onclick="fecharModal()">&times;</span>
      <h2 id="modal-titulo">Detalhes do Pedido</h2>
      <div id="pedido-detalhes"></div>
      <div class="form-group" style="margin-top:15px;">
        <label>Status</label>
        <select id="edit-status">
          <option value="novo">Novo</option>
          <option value="preparando">Preparando</option>
          <option value="saiu_entrega">Saiu para Entrega</option>
          <option value="entregue">Entregue</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="atualizarStatus()">Atualizar Status</button>
    </div>
  </div>

  <script src="admin.js"></script>
  <script>
    let pedidoAtual = null;

    function carregarPedidos() {
      const status = document.getElementById('filtro-status').value;
      const url = status ? `/api/pedidos?status=${status}` : '/api/pedidos';
      fetch(url).then(r => r.json()).then(data => {
        const container = document.getElementById('pedidos-container');
        if (data.length === 0) {
          container.innerHTML = '<div class="empty-state"><p>Nenhum pedido encontrado</p></div>';
          return;
        }
        let html = `<table class="tabela">
          <thead><tr><th>#</th><th>Cliente</th><th>Telefone</th><th>Total</th><th>Status</th><th>Data</th><th>Ações</th></tr></thead><tbody>`;
        const statusLabels = { novo: 'Novo', preparando: 'Preparando', saiu_entrega: 'Saiu p/ Entrega', entregue: 'Entregue', cancelado: 'Cancelado' };
        data.forEach(p => {
          html += `<tr>
            <td>#${p.id}</td>
            <td>${p.cliente_nome}</td>
            <td>${p.cliente_telefone}</td>
            <td>R$ ${p.total.toFixed(2).replace('.',',')}</td>
            <td><span class="badge badge-${p.status}">${statusLabels[p.status] || p.status}</span></td>
            <td>${p.criado_em}</td>
            <td><button class="btn btn-sm btn-primary" onclick="verPedido(${p.id})">👁️</button></td>
          </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
      });
    }

    function verPedido(id) {
      fetch('/api/pedidos/' + id).then(r => r.json()).then(p => {
        pedidoAtual = p;
        document.getElementById('edit-status').value = p.status;
        const statusLabels = { novo: 'Novo', preparando: 'Preparando', saiu_entrega: 'Saiu p/ Entrega', entregue: 'Entregue', cancelado: 'Cancelado' };
        let itensHtml = p.itens.map(function(i) {
          var detalhe = '';
          if (i.sabores && i.sabores.length > 0) {
            detalhe += '<div style="font-size:0.8rem;color:#666;padding-left:20px;margin-bottom:4px">Sabores: ' + i.sabores.map(function(s) { return s.sabor_nome; }).join(', ') + '</div>';
          }
          if (i.borda_nome && i.borda_preco > 0) {
            detalhe += '<div style="font-size:0.8rem;color:#666;padding-left:20px;margin-bottom:4px">Borda: ' + i.borda_nome + '</div>';
          }

          return '<div style="display:flex;flex-direction:column;padding:6px 0;border-bottom:1px solid #eee">' +
            '<div style="display:flex;justify-content:space-between">' +
              '<span>' + i.quantidade + 'x ' + i.produto_nome + '</span>' +
              '<span>R$ ' + (i.preco_unitario * i.quantidade).toFixed(2).replace('.',',') + '</span>' +
            '</div>' + detalhe +
          '</div>';
        }).join('');

        document.getElementById('pedido-detalhes').innerHTML = `
          <p><strong>Pedido #${p.id}</strong></p>
          <p><strong>Cliente:</strong> ${p.cliente_nome}</p>
          <p><strong>Telefone:</strong> ${p.cliente_telefone}</p>
          <p><strong>Endereço:</strong> ${p.cliente_endereco}</p>
          ${p.cliente_observacao ? `<p><strong>Obs:</strong> ${p.cliente_observacao}</p>` : ''}
          <p><strong>Status:</strong> <span class="badge badge-${p.status}">${statusLabels[p.status]}</span></p>
          <hr style="margin:10px 0">
          <p><strong>Itens:</strong></p>
          ${itensHtml}
          <hr style="margin:10px 0">
          <p style="text-align:right;font-size:1.1rem"><strong>Total: R$ ${p.total.toFixed(2).replace('.',',')}</strong></p>
          <p style="font-size:0.8rem;color:#999">Pedido realizado em: ${p.criado_em}</p>
        `;
        document.getElementById('modal-pedido').style.display = 'flex';
      });
    }

    function fecharModal() { document.getElementById('modal-pedido').style.display = 'none'; }

    function atualizarStatus() {
      if (!pedidoAtual) return;
      const status = document.getElementById('edit-status').value;
      fetch(`/api/pedidos/${pedidoAtual.id}/status`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      }).then(r => r.json()).then(() => { fecharModal(); carregarPedidos(); });
    }

    carregarPedidos();
    setInterval(carregarPedidos, 15000);
  </script>
</body>
</html>
