<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos - Kokito's Pizzaria</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .cliente-group { margin-bottom: 24px; border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden; }
    .cliente-header { background: #f8f9fa; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid #e0e0e0; user-select: none; }
    .cliente-header:hover { background: #f0f1f2; }
    .cliente-header .nome { font-size: 1.05rem; font-weight: 700; color: #2c3e50; }
    .cliente-header .qtd { font-size: 0.8rem; color: #666; }
    .cliente-header .toggle { font-size: 0.8rem; color: #999; }
    .cliente-body { display: block; }
    .cliente-body.recolhido { display: none; }
    .pedido-row { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; display: flex; flex-direction: column; gap: 6px; }
    .pedido-row:last-child { border-bottom: none; }
    .pedido-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
    .pedido-info { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; font-size: 0.85rem; }
    .pedido-info strong { font-size: 0.9rem; }
    .pedido-acoes { display: flex; gap: 6px; flex-wrap: wrap; }
    .pedido-acoes button { padding: 4px 10px; font-size: 0.75rem; border-radius: 6px; cursor: pointer; border: none; font-weight: 600; }
    .pedido-detalhes { font-size: 0.82rem; color: #555; background: #fafafa; border-radius: 6px; padding: 8px 12px; margin-top: 4px; line-height: 1.5; }
    .pedido-detalhes .item { padding: 2px 0; }
    .pedido-total { font-weight: 700; color: #e74c3c; }
    .filtros-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filtros-row select, .filtros-row input { padding: 8px 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 0.85rem; }
    .filtros-row input { flex: 1; min-width: 180px; }
  </style>
</head>
<body class="admin-body">
  <div id="sidebar"></div>
  <div class="admin-content">
    <div class="admin-header">
      <h1>📋 Pedidos</h1>
      <div class="filtros-row">
        <input type="text" id="filtro-cliente" placeholder="Buscar cliente..." oninput="carregarPedidos()">
        <select id="filtro-status" onchange="carregarPedidos()">
          <option value="">Todos os status</option>
          <option value="novo">Novo</option>
          <option value="preparando">Preparando</option>
          <option value="saiu_entrega">Saiu p/ Entrega</option>
          <option value="entregue">Entregue</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>
    </div>
    <div id="pedidos-container"></div>
  </div>

  <script src="admin.js"></script>
  <script>
    const statusLabels = { novo: 'Novo', preparando: 'Preparando', saiu_entrega: 'Saiu p/ Entrega', entregue: 'Entregue', cancelado: 'Cancelado' };
    const statusColors = { novo: '#f85149', preparando: '#d29922', saiu_entrega: '#58a6ff', entregue: '#3fb950', cancelado: '#8b949e' };

    function carregarPedidos() {
      const status = document.getElementById('filtro-status').value;
      const busca = document.getElementById('filtro-cliente').value.toLowerCase().trim();
      const url = status ? `/api/pedidos?status=${status}` : '/api/pedidos';
      fetch(url).then(r => r.json()).then(data => {
        let filtrados = data;
        if (busca) {
          filtrados = data.filter(p => p.cliente_nome.toLowerCase().includes(busca) || (p.cliente_telefone || '').includes(busca));
        }
        const container = document.getElementById('pedidos-container');
        if (filtrados.length === 0) {
          container.innerHTML = '<div class="card"><div class="empty-state"><p>Nenhum pedido encontrado</p></div></div>';
          return;
        }
        const grupos = {};
        filtrados.forEach(p => {
          const chave = p.cliente_nome + '|' + (p.cliente_telefone || '');
          if (!grupos[chave]) grupos[chave] = { nome: p.cliente_nome, telefone: p.cliente_telefone, endereco: p.cliente_endereco, pedidos: [] };
          grupos[chave].pedidos.push(p);
        });
        let html = '';
        Object.values(grupos).forEach(g => {
          g.pedidos.sort((a, b) => new Date(b.criado_em) - new Date(a.criado_em));
          html += '<div class="cliente-group" data-cliente="' + g.nome.replace(/"/g, '&quot;') + '">';
          html += '<div class="cliente-header" onclick="toggleCliente(this)">';
          html += '<div><span class="nome">👤 ' + g.nome + '</span> <span class="qtd">(' + g.pedidos.length + ' pedido' + (g.pedidos.length !== 1 ? 's' : '') + ')</span></div>';
          html += '<span class="toggle">▲</span></div>';
          html += '<div class="cliente-body">';
          g.pedidos.forEach(p => {
            const dt = p.criado_em ? p.criado_em.substring(0, 10) : '';
            const hr = p.criado_em ? p.criado_em.substring(11, 16) : '';
            const itemsHtml = p.itens.map(function(i) {
              var det = '';
              if (i.sabores && i.sabores.length > 0) det += ' <span style="color:#f39c12">(' + i.sabores.map(function(s){return s.sabor_nome}).join(', ') + ')</span>';
              if (i.borda_nome && i.borda_preco > 0) det += ' <span style="color:#e67e22">Borda: ' + i.borda_nome + '</span>';
              return '<div class="item">' + i.quantidade + 'x ' + i.produto_nome + ' — R$ ' + (i.preco_unitario * i.quantidade).toFixed(2).replace('.',',') + det + '</div>';
            }).join('');
            html += '<div class="pedido-row">';
            html += '<div class="pedido-top">';
            html += '<div class="pedido-info">';
            html += '<strong>#' + p.id + '</strong>';
            html += '<span style="color:' + (statusColors[p.status] || '#666') + ';font-weight:600">' + (statusLabels[p.status] || p.status) + '</span>';
            html += '<span>' + dt + ' às ' + hr + '</span>';
            html += '<span class="pedido-total">R$ ' + p.total.toFixed(2).replace('.',',') + '</span>';
            html += '</div>';
            html += '<div class="pedido-acoes">';
            html += '<button style="background:#e8f4fd;color:#1f6feb" onclick="alterarStatus(' + p.id + ', \'' + p.status + '\')">📝 Status</button>';
            html += '<button style="background:#fee8e8;color:#da3633" onclick="excluirPedido(' + p.id + ')">🗑️ Excluir</button>';
            html += '</div></div>';
            if (p.cliente_endereco || p.cliente_observacao || p.pagamento || p.itens.length > 0) {
              html += '<div class="pedido-detalhes">';
              html += itemsHtml;
              if (p.cliente_endereco) html += '<div style="margin-top:4px">📍 ' + p.cliente_endereco + '</div>';
              if (p.cliente_observacao) html += '<div style="color:#d29922">📝 ' + p.cliente_observacao + '</div>';
              html += '</div>';
            }
            html += '</div>';
          });
          html += '</div></div>';
        });
        container.innerHTML = html;
      });
    }

    function toggleCliente(el) {
      const body = el.nextElementSibling;
      const toggle = el.querySelector('.toggle');
      if (body.classList.toggle('recolhido')) {
        toggle.textContent = '▼';
      } else {
        toggle.textContent = '▲';
      }
    }

    function alterarStatus(id, statusAtual) {
      const opcoes = ['novo', 'preparando', 'saiu_entrega', 'entregue', 'cancelado'];
      const labels = statusLabels;
      const msg = 'Status atual: ' + (labels[statusAtual] || statusAtual) + '\n\nNovo status:\n' +
        opcoes.map(function(s, i) { return (i + 1) + ' - ' + labels[s]; }).join('\n') +
        '\n\nDigite o número do novo status:';
      const escolha = prompt(msg);
      if (!escolha) return;
      const idx = parseInt(escolha) - 1;
      if (idx < 0 || idx >= opcoes.length) { alert('Opção inválida'); return; }
      const novoStatus = opcoes[idx];
      fetch('/api/pedidos/' + id + '/status', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: novoStatus })
      }).then(function(r) { return r.json(); }).then(function() { carregarPedidos(); });
    }

    function excluirPedido(id) {
      if (!confirm('Excluir pedido #' + id + ' permanentemente?')) return;
      fetch('/api/pedidos/' + id, { method: 'DELETE' }).then(function(r) { return r.json(); }).then(function() { carregarPedidos(); });
    }

    carregarPedidos();
    setInterval(carregarPedidos, 15000);
  </script>
</body>
</html>
